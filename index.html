<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>伴读 Reader</title>
  <meta name="theme-color" content="#0b7a75">
  <meta name="description" content="一个面向长文、学习材料和严肃内容的低阻力阅读辅助工具。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ec;
      --panel: #fffefa;
      --ink: #171717;
      --muted: #68635b;
      --line: #d9d1c3;
      --hairline: rgba(23, 23, 23, 0.1);
      --panel-shadow: 0 18px 46px rgba(45, 39, 28, 0.06);
      --control-bg: rgba(255, 255, 255, 0.72);
      --accent: #0b7a75;
      --accent-ink: #ffffff;
      --highlight: #ffe66d;
      --highlight-ink: #101010;
      --mark: #0f766e;
      --mark-bg: rgba(15, 118, 110, 0.1);
      --flow-link: #1d70b8;
      --flow-old: #fff0a6;
      --flow-new: #147a4b;
      --flow-tag: #f3dfb2;
      --sentence-bg: rgba(11, 122, 117, 0.06);
      --sentence-line: rgba(11, 122, 117, 0.22);
      --comfort-bg: rgba(11, 122, 117, 0.08);
      --comfort-line: rgba(11, 122, 117, 0.2);
      --font-size: 34px;
      --line-height: 1.75;
      --max-width: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="soft"] {
      --bg: #f6f3ec;
      --panel: #fffefa;
      --ink: #171717;
      --muted: #68635b;
      --line: #d9d1c3;
      --highlight: #ffe66d;
    }

    body[data-theme="clean"] {
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #d0d5dd;
      --highlight: #fff176;
    }

    body[data-theme="open"] {
      --bg: #f2f7f4;
      --panel: #fffffb;
      --ink: #102019;
      --muted: #617068;
      --line: #cbd9d1;
      --highlight: #ffec8a;
      --line-height: 1.95;
      --max-width: 860px;
    }

    body[data-theme="night"] {
      color-scheme: dark;
      --bg: #111318;
      --panel: #181b22;
      --ink: #f2f4f7;
      --muted: #a4aab5;
      --line: #333844;
      --hairline: rgba(255, 255, 255, 0.11);
      --panel-shadow: 0 18px 46px rgba(0, 0, 0, 0.18);
      --control-bg: rgba(255, 255, 255, 0.08);
      --accent: #55b8ad;
      --accent-ink: #071412;
      --highlight: #f2c94c;
      --highlight-ink: #111318;
      --mark: #7dd3c7;
      --mark-bg: rgba(125, 211, 199, 0.14);
      --flow-old: rgba(242, 201, 76, 0.22);
      --flow-tag: rgba(242, 201, 76, 0.22);
      --sentence-bg: rgba(85, 184, 173, 0.09);
      --sentence-line: rgba(85, 184, 173, 0.28);
      --comfort-bg: rgba(85, 184, 173, 0.12);
      --comfort-line: rgba(85, 184, 173, 0.3);
    }

    body[data-theme="night"] .input-panel {
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    }

    button, textarea, input, select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      gap: 12px;
      padding: 14px 18px;
      background: color-mix(in srgb, var(--panel) 82%, transparent);
      border-bottom: 1px solid var(--hairline);
      backdrop-filter: blur(18px) saturate(1.12);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .action-group {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .primary-actions {
      margin-left: auto;
    }

    .reading-actions {
      gap: 6px;
    }

    .brand {
      font-weight: 800;
      font-size: 22px;
      margin-right: auto;
    }

    .button {
      border: 1px solid var(--line);
      background: var(--control-bg);
      color: var(--ink);
      min-height: 42px;
      padding: 0 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .button:hover:not(:disabled) {
      border-color: color-mix(in srgb, var(--accent) 28%, var(--line));
      background: color-mix(in srgb, var(--control-bg) 80%, var(--panel));
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 700;
    }

    .button.comfort {
      border-color: var(--comfort-line);
      background: var(--comfort-bg);
      color: var(--ink);
      font-weight: 700;
    }

    .button.utility {
      color: var(--muted);
      background: color-mix(in srgb, var(--panel) 78%, var(--bg));
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button.context-action:disabled {
      display: none;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
      min-height: 38px;
      padding: 0 4px;
    }

    .control input[type="range"] {
      width: 150px;
      accent-color: var(--accent);
    }

    .mode-row {
      padding-top: 0;
    }

    .settings-row {
      padding-top: 2px;
      gap: 14px;
    }

    .reader-shell {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: clamp(14px, 2vw, 24px);
      padding: clamp(14px, 2vw, 24px);
      min-height: 0;
      align-items: start;
    }

    body.focus-mode .toolbar {
      grid-template-rows: auto;
    }

    body.focus-mode .toolbar-row.settings-row,
    body.focus-mode .input-panel,
    body.focus-mode .notes-panel {
      display: none;
    }

    body.focus-mode .reader-shell {
      grid-template-columns: 1fr;
      padding: 10px;
    }

    body.focus-mode .reader-panel {
      border-color: transparent;
      padding-top: clamp(14px, 2vw, 28px);
    }

    body.browse-mode .toolbar {
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.04);
    }

    body.browse-mode .toolbar-row.settings-row,
    body.browse-mode .input-panel {
      display: none;
    }

    body.browse-mode .reader-shell {
      grid-template-columns: 1fr;
      padding: 10px;
    }

    body.browse-mode .reader-panel {
      min-height: calc(100vh - 86px);
    }

    body.gentle-mode .toolbar {
      box-shadow: 0 10px 30px rgba(16, 24, 40, 0.04);
    }

    body.gentle-mode .reader-panel {
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--bg) 35%, transparent), transparent 18%, transparent 82%, color-mix(in srgb, var(--bg) 35%, transparent)),
        var(--panel);
    }

    .toolbar.collapsed .advanced-control,
    .toolbar.collapsed .mode-row,
    .toolbar.collapsed .settings-row {
      display: none;
    }

    .input-panel, .reader-panel, .notes-panel {
      background: var(--panel);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      box-shadow: var(--panel-shadow);
      min-height: 0;
    }

    .input-panel {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 9px;
      padding: 13px;
      align-self: start;
      box-shadow: 0 12px 32px rgba(45, 39, 28, 0.035);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-heading .button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      max-height: 42vh;
      resize: vertical;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 13px 14px;
      background: color-mix(in srgb, var(--panel) 84%, #ffffff);
      color: var(--ink);
      line-height: 1.55;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .reader-panel {
      overflow: auto;
      padding: clamp(22px, 4vw, 56px);
      min-height: calc(100vh - 132px);
    }

    .reader {
      max-width: var(--max-width);
      margin: 0 auto;
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      font-size: var(--font-size);
      line-height: var(--line-height);
      letter-spacing: 0;
      white-space: pre-wrap;
    }

    .paragraph {
      margin: 0 0 1.1em;
    }

    .paragraph:last-child {
      margin-bottom: 0;
    }

    .token {
      display: inline;
      padding: 0 0.03em;
      border-radius: 4px;
      transition: background-color 180ms ease, color 180ms ease, opacity 260ms ease, box-shadow 220ms ease, text-decoration-color 180ms ease;
    }

    .token strong {
      font-weight: 900;
    }

    .token.active {
      background: var(--highlight);
      color: var(--highlight-ink);
      box-shadow: 0 0 0 0.08em var(--highlight);
    }

    body.gentle-mode .token.active {
      border-radius: 7px;
      box-shadow: 0 0 0 0.14em var(--highlight), 0 0.18em 0.7em rgba(16, 24, 40, 0.08);
      text-decoration-line: underline;
      text-decoration-color: color-mix(in srgb, var(--highlight-ink) 55%, transparent);
      text-decoration-thickness: 0.09em;
      text-underline-offset: 0.2em;
      animation: currentWordAppear 260ms ease-out;
    }

    .sentence-focus {
      background: var(--sentence-bg);
      box-shadow: 0 0 0 0.16em var(--sentence-bg);
      border-bottom: 1px solid var(--sentence-line);
      border-radius: 5px;
    }

    body.gentle-mode .sentence-focus {
      background: color-mix(in srgb, var(--comfort-bg) 78%, transparent);
      box-shadow: 0 0 0 0.18em color-mix(in srgb, var(--comfort-bg) 72%, transparent);
      border-bottom-color: var(--comfort-line);
      animation: sentenceAppear 360ms ease-out;
    }

    body.gentle-mode .token.gentle-read {
      opacity: 0.48;
    }

    body.gentle-mode .token.gentle-outside {
      opacity: 0.3;
    }

    body.gentle-mode .paragraph.gentle-away {
      opacity: 0.38;
    }

    body.gentle-mode .paragraph.gentle-current {
      opacity: 1;
    }

    @keyframes currentWordAppear {
      from {
        background: color-mix(in srgb, var(--highlight) 35%, transparent);
        box-shadow: 0 0 0 0.02em color-mix(in srgb, var(--highlight) 50%, transparent);
      }
      to {
        background: var(--highlight);
        box-shadow: 0 0 0 0.14em var(--highlight), 0 0.18em 0.7em rgba(16, 24, 40, 0.08);
      }
    }

    @keyframes sentenceAppear {
      from {
        background: transparent;
        box-shadow: 0 0 0 0 transparent;
      }
      to {
        background: color-mix(in srgb, var(--comfort-bg) 78%, transparent);
        box-shadow: 0 0 0 0.18em color-mix(in srgb, var(--comfort-bg) 72%, transparent);
      }
    }

    .token.flow-link {
      color: #064f86;
      text-decoration-line: underline;
      text-decoration-color: var(--flow-link);
      text-decoration-thickness: 0.12em;
      text-underline-offset: 0.18em;
    }

    .token.flow-old {
      background: var(--flow-old);
      box-shadow: 0 0 0 0.08em var(--flow-old);
    }

    .token.flow-new {
      color: #0b5d36;
      text-decoration-line: underline;
      text-decoration-color: rgba(20, 122, 75, 0.55);
      text-decoration-style: dotted;
      text-decoration-thickness: 0.1em;
      text-underline-offset: 0.18em;
    }

    .token.active.flow-link,
    .token.active.flow-old,
    .token.active.flow-new {
      background: var(--highlight);
      color: var(--highlight-ink);
      box-shadow: 0 0 0 0.08em var(--highlight);
      text-decoration-color: currentColor;
    }

    .token.marked-sentence {
      background: var(--mark-bg);
      box-shadow: 0 0 0 0.08em var(--mark-bg);
      text-decoration-line: underline;
      text-decoration-color: color-mix(in srgb, var(--mark) 75%, transparent);
      text-decoration-thickness: 0.1em;
      text-underline-offset: 0.22em;
    }

    .token.active.marked-sentence {
      background: var(--highlight);
      color: var(--highlight-ink);
      box-shadow: 0 0 0 0.08em var(--highlight);
      text-decoration-color: var(--mark);
    }

    .flow-label {
      display: inline-flex;
      align-items: center;
      vertical-align: 0.14em;
      margin-right: 0.45em;
      padding: 0.1em 0.45em;
      border-radius: 999px;
      background: var(--flow-tag);
      color: #4d3900;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.42em;
      font-weight: 800;
      line-height: 1.35;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 1rem;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .swatch {
      display: inline-flex;
      align-items: center;
      min-width: 2.4em;
      height: 1.5em;
      padding: 0 0.35em;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      color: var(--ink);
      background: #fff;
      font-weight: 700;
      line-height: 1;
    }

    .swatch.link {
      color: #064f86;
      text-decoration-line: underline;
      text-decoration-color: var(--flow-link);
      text-decoration-thickness: 0.12em;
      text-underline-offset: 0.18em;
    }

    .swatch.old {
      background: var(--flow-old);
    }

    .swatch.new {
      color: #0b5d36;
      text-decoration-line: underline;
      text-decoration-color: rgba(20, 122, 75, 0.55);
      text-decoration-style: dotted;
      text-decoration-thickness: 0.1em;
      text-underline-offset: 0.18em;
    }

    .empty-state {
      color: var(--muted);
      font-size: var(--font-size);
      line-height: var(--line-height);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .notes-panel {
      grid-column: 1 / -1;
      padding: 16px;
    }

    .notes-panel summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 800;
    }

    .notes-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .notes-output {
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) 1.4fr;
      gap: 16px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.55;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 92%, var(--bg));
    }

    .note-card h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--muted);
    }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .keyword-list li {
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      background: var(--flow-old);
    }

    .key-sentence-list {
      margin: 0;
      padding-left: 1.25rem;
    }

    .key-sentence-list li {
      margin: 0.45rem 0;
    }

    .note-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .progress-pill {
      display: none;
      position: sticky;
      top: 0;
      z-index: 2;
      width: fit-content;
      margin: 0 auto 1rem;
      padding: 0.28rem 0.65rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.2;
      backdrop-filter: blur(8px);
    }

    .progress-pill.visible {
      display: block;
    }

    .comfort-note {
      display: none;
      max-width: var(--max-width);
      margin: 0 auto 1rem;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--comfort-line);
      border-radius: 8px;
      background: var(--comfort-bg);
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    body.gentle-mode .comfort-note {
      display: block;
    }

    .gentle-guide {
      display: none;
      max-width: var(--max-width);
      margin: 0 auto 1rem;
      padding: 0.75rem 0.85rem;
      border-left: 4px solid var(--comfort-line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--comfort-bg) 70%, transparent);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }

    body.gentle-mode .gentle-guide.visible {
      display: block;
    }

    @media (max-width: 900px) {
      .toolbar {
        gap: 8px;
        padding: 8px;
      }

      .toolbar-row {
        gap: 8px;
      }

      .brand {
        flex: 1 1 100%;
        font-size: 18px;
        line-height: 1.25;
      }

      .action-group,
      .primary-actions {
        margin-left: 0;
      }

      .support-actions {
        flex: 1 1 100%;
      }

      .button {
        min-height: 40px;
        padding: 0 10px;
      }

      .toolbar-row.settings-row {
        align-items: stretch;
      }

      .control {
        width: 100%;
        justify-content: space-between;
      }

      .control input[type="range"] {
        width: min(52vw, 220px);
      }

      .reader-shell {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px;
      }

      textarea {
        min-height: 34vh;
        max-height: none;
        font-size: 18px;
      }

      .input-panel,
      .reader-panel,
      .notes-panel {
        padding: 10px;
      }

      .reader-panel {
        padding: 16px 10px;
        min-height: 54vh;
      }

      .notes-output {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-row">
        <div class="brand">伴读 <span style="font-weight: 600; color: var(--muted);">Reader</span></div>
        <div class="action-group primary-actions">
          <button class="button primary" id="playButton" type="button">开始伴读</button>
        </div>
        <div class="action-group reading-actions">
          <button class="button utility context-action" id="pauseButton" type="button" disabled>暂停</button>
          <button class="button utility context-action" id="previousButton" type="button" disabled>上一句</button>
          <button class="button utility context-action" id="markButton" type="button" disabled>标记这一句</button>
          <button class="button utility context-action" id="stopButton" type="button" disabled>停止</button>
        </div>
        <div class="action-group support-actions">
          <button class="button comfort" id="gentleButton" type="button" aria-pressed="false">逐句伴读</button>
          <button class="button utility" id="voiceButton" type="button" aria-pressed="true">声音：开</button>
          <button class="button utility" id="menuButton" type="button" aria-expanded="false">设置</button>
        </div>
      </div>
      <div class="toolbar-row mode-row">
        <button class="button advanced-control" id="flowButton" type="button" aria-pressed="false">结构提示：关闭</button>
        <button class="button advanced-control" id="bionicButton" type="button" aria-pressed="false">英文词首加粗：关闭</button>
        <button class="button advanced-control" id="intensityButton" type="button" hidden>结构强度：轻</button>
        <button class="button advanced-control" id="languageButton" type="button">中文 / English</button>
      </div>
      <div class="toolbar-row settings-row">
        <label class="control">语速 <input id="rateInput" type="range" min="0.7" max="2" step="0.05" value="1.15"><span id="rateValue">1.15x</span></label>
        <label class="control">字号 <input id="fontInput" type="range" min="24" max="64" step="2" value="38"><span id="fontValue">38px</span></label>
        <label class="control">行距 <input id="lineInput" type="range" min="1.35" max="2.2" step="0.05" value="1.75"><span id="lineValue">1.75</span></label>
        <label class="control">宽度 <input id="widthInput" type="range" min="620" max="1280" step="20" value="980"><span id="widthValue">980px</span></label>
        <button class="button" id="themeButton" type="button">主题：柔和</button>
      </div>
    </header>

    <main class="reader-shell">
      <section class="input-panel">
        <div class="panel-heading">
          <h1 class="panel-title">放入文字</h1>
          <button class="button utility" id="clipboardButton" type="button">读取剪贴板</button>
        </div>

    function normalizeForSpeech(text) {
      return text.replace(/[ \t]+\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function lowerToken(text) {
      return text.toLowerCase().replace(/^[^\p{L}\p{N}]+|[^\p{L}\p{N}]+$/gu, "");
    }

    function roughWordCount(text) {
      const enWords = text.match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)?/g)?.length || 0;
      const cjkChars = text.match(/[\u3400-\u9fff]/g)?.length || 0;
      return enWords + Math.ceil(cjkChars / 2);
    }

    function cjkRatio(text) {
      const visible = Array.from(text).filter(char => !/\s/.test(char));
      if (!visible.length) return 0;
      const cjk = visible.filter(char => /[\u3400-\u9fff]/.test(char)).length;
      return cjk / visible.length;
    }

    function effectiveFlowMode(source) {
      if (flowMode !== "auto") return flowMode;
      return cjkRatio(source) > 0.35 ? "zh" : "en";
    }

    function splitSentences(text) {
      const source = text.trim();
      if (!source) return [];
      const matches = source.matchAll(/[^.!?。！？]+[.!?。！？]?/g);
      return Array.from(matches)
        .map(match => ({
          text: match[0],
          start: match.index,
          end: match.index + match[0].length
        }))
        .filter(sentence => sentence.text.trim());
    }

    function paragraphRanges(text) {
      const source = text.trim();
      if (!source) return [];
      const ranges = [];
      const pattern = /\n{2,}/g;
      let start = 0;
      let match;

      while ((match = pattern.exec(source)) !== null) {
        if (match.index > start) {
          ranges.push({ start, end: match.index });
        }
        start = match.index + match[0].length;
      }

      if (start < source.length) {
        ranges.push({ start, end: source.length });
      }

      return ranges.length ? ranges : [{ start: 0, end: source.length }];
    }

    function paragraphIndexForToken(index) {
      const source = sourceText.value.trim();
      if (!source || index < 0 || !tokens[index]) return -1;
      const ranges = paragraphRanges(source);
      return ranges.findIndex(range => tokens[index].start >= range.start && tokens[index].start <= range.end);
    }

    function sentenceRangeForToken(index) {
      const source = sourceText.value.trim();
      if (!source || index < 0 || !tokens[index]) return null;
      return splitSentences(source).find(sentence => tokens[index].start >= sentence.start && tokens[index].start < sentence.end) || null;
    }

    function sentenceIndexForToken(index) {
      const source = sourceText.value.trim();
      if (!source || index < 0 || !tokens[index]) return -1;
      return splitSentences(source).findIndex(sentence => tokens[index].start >= sentence.start && tokens[index].start < sentence.end);
    }

    function previousSentenceTokenIndex() {
      const source = sourceText.value.trim();
      const currentSentenceIndex = sentenceIndexForToken(activeIndex);
      if (!source || currentSentenceIndex <= 0) return -1;
      const previousSentence = splitSentences(source)[currentSentenceIndex - 1];
      return previousSentence ? tokenIndexForChar(previousSentence.start) : -1;
    }

    function connectorLabelForSentence(sentenceText) {
      const normalized = sentenceText.toLowerCase().replace(/\s+/g, " ").trim();
      for (const group of connectorGroups) {
        if (group.words.some(word => normalized.startsWith(word + " ") || normalized.includes(" " + word + " "))) {
          return group.label;
        }
      }
      return "";
    }

    function zhConnectorLabelForSentence(sentenceText) {
      for (const group of zhConnectorGroups) {
        if (group.words.some(word => sentenceText.includes(word))) {
          return group.label;
        }
      }
      if (/[?？]$/.test(sentenceText.trim())) return "问题";
      return "";
    }

    function tokenize(text) {
      const source = text.trim();
      if (!source) return [];

      if (segmenter) {
        return Array.from(segmenter.segment(source))
          .filter(part => part.isWordLike || /[，。！？；：、,.!?;:]/.test(part.segment))
          .map(part => ({
            text: part.segment,
            start: part.index,
            end: part.index + part.segment.length,
            flow: ""
          }));
      }

      const matches = source.matchAll(/[\p{Script=Han}]{1,4}|[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)?|[^\s]/gu);
      return Array.from(matches).map(match => ({
        text: match[0],
        start: match.index,
        end: match.index + match[0].length,
        flow: ""
      }));
    }

    function noteTokens(text) {
      const source = text.trim();
      if (!source) return [];
      const matches = source.matchAll(/[\u3400-\u9fff]{2,6}|[A-Za-z][A-Za-z0-9]+(?:['-][A-Za-z0-9]+)?/gu);
      return Array.from(matches).map(match => ({
        text: match[0],
        index: match.index,
        key: /[\u3400-\u9fff]/.test(match[0]) ? match[0] : lowerToken(match[0])
      }));
    }

    function isUsefulNoteToken(token) {
      if (!token.key) return false;
      if (/^[0-9]+$/.test(token.key)) return false;
      if (/[\u3400-\u9fff]/.test(token.key)) {
        return token.key.length >= 2 && !zhNoteStopWords.has(token.key);
      }
      return token.key.length >= 4 && !stopWords.has(token.key);
    }

    function isChineseConceptKey(key) {
      if (!key || /^[0-9]+$/.test(key)) return false;
      if (/[\u3400-\u9fff]/.test(key)) {
        return key.length >= 2 && !zhNoteStopWords.has(key) && !zhReferenceWords.includes(key);
      }
      return key.length >= 4 && !stopWords.has(key);
    }

    function extractKeywords(text, limit = 18) {
      const items = noteTokens(text).filter(isUsefulNoteToken);
      const counts = new Map();

      for (const item of items) {
        const entry = counts.get(item.key) || { text: item.text, count: 0, first: item.index };
        entry.count += 1;
        entry.first = Math.min(entry.first, item.index);
        if (item.text.length > entry.text.length) entry.text = item.text;
        counts.set(item.key, entry);
      }

      const textLength = Math.max(text.length, 1);
      return Array.from(counts.values())
        .map(item => ({
          ...item,
          score: item.count * 3 + (1 - item.first / textLength)
        }))
        .sort((a, b) => b.score - a.score || a.first - b.first)
        .slice(0, limit)
        .map(item => item.text);
    }

    function sentenceScore(sentence, keywordSet, position, total) {
      const tokensInSentence = noteTokens(sentence.text).filter(isUsefulNoteToken);
      const unique = new Set(tokensInSentence.map(token => token.key));
      const keywordHits = Array.from(unique).filter(key => keywordSet.has(key)).length;
      const connectorBoost = connectorGroups.concat(zhConnectorGroups)
        .some(group => group.words.some(word => sentence.text.toLowerCase().includes(word))) ? 1.2 : 0;
      const lengthPenalty = sentence.text.length > 240 ? -1.5 : sentence.text.length < 24 ? -1 : 0;
      const earlyBoost = position < Math.max(2, total * 0.2) ? 0.8 : 0;
      return keywordHits * 2 + connectorBoost + earlyBoost + lengthPenalty;
    }

    function extractKeySentences(text, keywords, limit = 5) {
      const sentences = splitSentences(text);
      const keywordSet = new Set(keywords.map(keyword => /[\u3400-\u9fff]/.test(keyword) ? keyword : lowerToken(keyword)));
      return sentences
        .map((sentence, index) => ({
          text: sentence.text.trim(),
          index,
          score: sentenceScore(sentence, keywordSet, index, sentences.length)
        }))
        .filter(item => item.text.length >= 12)
        .sort((a, b) => b.score - a.score || a.index - b.index)
        .slice(0, limit)
        .sort((a, b) => a.index - b.index)
        .map(item => item.text);
    }

    function buildNotesDraft(text) {
      const keywords = extractKeywords(text);
      const keySentences = extractKeySentences(text, keywords);
      return { keywords, keySentences, marked: markedSentences.map(sentence => sentence.text) };
    }

    function renderNotes() {
      const text = sourceText.value.trim();
      if (!text) {
        notesOutput.innerHTML = `<div class="note-card">${escapeHTML(t("pasteFirst"))}</div>`;
        return;
      }

      const { keywords, keySentences, marked } = buildNotesDraft(text);
      const meta = t("noteMeta", {
        chars: text.length.toLocaleString(),
        words: roughWordCount(text).toLocaleString()
      });
      notesOutput.innerHTML = `
        <section class="note-card">
          <h2>${escapeHTML(t("noteReminderTitle"))}</h2>
          <p>${escapeHTML(t("noteReminder"))}</p>
        </section>
        <section class="note-card">
          <h2>${escapeHTML(t("markedTitle"))}</h2>
          <ol class="key-sentence-list">
            ${marked.map(sentence => `<li>${escapeHTML(sentence)}</li>`).join("") || `<li>${escapeHTML(t("none"))}</li>`}
          </ol>
          <div class="note-meta">${escapeHTML(t("notesDisclaimer"))}</div>
        </section>
        <section class="note-card">
          <h2>${escapeHTML(t("keywordsTitle"))}</h2>
          <ul class="keyword-list">
            ${keywords.map(keyword => `<li>${escapeHTML(keyword)}</li>`).join("") || `<li>${escapeHTML(t("none"))}</li>`}
          </ul>
          <div class="note-meta">${meta}</div>
        </section>
        <section class="note-card">
          <h2>${escapeHTML(t("keySentencesTitle"))}</h2>
          <ol class="key-sentence-list">
            ${keySentences.map(sentence => `<li>${escapeHTML(sentence)}</li>`).join("") || `<li>${escapeHTML(t("none"))}</li>`}
          </ol>
          <div class="note-meta">${escapeHTML(t("notesDisclaimer"))}</div>
        </section>
      `;
    }

    async function copyNotesDraft() {
      const text = sourceText.value.trim();
      if (!text) {
        setStatus(t("pasteFirst"));
        return;
      }

      const { keywords, keySentences, marked } = buildNotesDraft(text);
      const draft = [
        t("draftReminder"),
        `- ${t("noteReminder")}`,
        "",
        t("draftMarked"),
        marked.map(sentence => `- ${sentence}`).join("\n") || `- ${t("none")}`,
        "",
        t("draftKeywords"),
        keywords.map(keyword => `- ${keyword}`).join("\n") || `- ${t("none")}`,
        "",
        t("draftKeySentences"),
        keySentences.map(sentence => `- ${sentence}`).join("\n") || `- ${t("none")}`
      ].join("\n");

      try {
        await navigator.clipboard.writeText(draft);
        setStatus(t("notesCopied"));
      } catch {
        setStatus(t("copyFailed"));
      }
    }

    function isTokenInMarkedSentence(token) {
      return markedSentences.some(sentence => token.start >= sentence.start && token.end <= sentence.end);
    }

    function isSentenceMarked(sentence) {
      const text = sentence.text.trim().replace(/\s+/g, " ");
      return markedSentences.some(item => item.start === sentence.start && item.end === sentence.end && item.text === text);
    }

    function markCurrentSentence() {
      const sentence = sentenceRangeForToken(activeIndex);
      if (!sentence) {
        setStatus(t("noSentenceToMark"));
        return;
      }

      const text = sentence.text.trim().replace(/\s+/g, " ");
      if (isSentenceMarked(sentence)) {
        markedSentences = markedSentences.filter(item => !(item.start === sentence.start && item.end === sentence.end && item.text === text));
        render();
        if (notesPanel.open) renderNotes();
        setStatus(t("sentenceUnmarked"));
        return;
      }

      markedSentences.push({ start: sentence.start, end: sentence.end, text });
      render();
      if (notesPanel.open) renderNotes();
      setStatus(t("sentenceMarked"));
    }

    function goToPreviousSentence() {
      const targetIndex = previousSentenceTokenIndex();
      if (targetIndex < 0) {
        setStatus(t("noPreviousSentence"));
        return;
      }

      if (isReading && !isPaused) {
        startFromToken(targetIndex);
        return;
      }

      if (isReading && isPaused) playbackRunId += 1;
      clearSilentTimer();
      if (voiceEnabled) window.speechSynthesis.cancel();
      utterance = null;
      activeIndex = targetIndex;
      render();
      updatePlaybackButtons();
      setStatus(t("previousSentenceReady"));
    }

    function annotateInformationFlow(sourceTokens, source) {
      if (annotationIntensity === "off") return sourceTokens;
      const annotated = sourceTokens.map(token => ({ ...token, flow: "" }));
      const seenTerms = new Map();

      for (const token of annotated) {
        const key = lowerToken(token.text);
        if (!key || key.length < 3 || stopWords.has(key)) continue;
        seenTerms.set(key, (seenTerms.get(key) ?? 0) + 1);
      }

      const alreadySeen = new Set();
      const sentences = splitSentences(source);

      for (const sentence of sentences) {
        const indices = annotated
          .map((token, index) => ({ token, index }))
          .filter(item => item.token.start >= sentence.start && item.token.end <= sentence.end)
          .map(item => item.index);

        if (!indices.length) continue;

        const label = connectorLabelForSentence(sentence.text);
        if (label) annotated[indices[0]].sentenceLabel = label;

        for (const index of indices) {
          const token = annotated[index];
          const key = lowerToken(token.text);
          if (!key) continue;

          const isConnector = connectorGroups.some(group => group.words.includes(key));
          if (isConnector) {
            token.flow = "link";
          } else if (key.length >= 3 && seenTerms.get(key) > 1 && alreadySeen.has(key)) {
            token.flow = "old";
          }

          if (key.length >= 3 && !stopWords.has(key)) {
            alreadySeen.add(key);
          }
        }

        const contentIndices = indices.filter(index => {
          const key = lowerToken(annotated[index].text);
          return key.length >= 4 && !stopWords.has(key) && annotated[index].flow !== "link";
        });

        const hasSignal = indices.some(index => annotated[index].flow === "link" || annotated[index].flow === "old");
        if (annotationIntensity === "light" && !hasSignal) continue;
        if (!hasSignal && contentIndices.length < 8) continue;

        const newLimit = annotationIntensity === "standard" ? 2 : 1;
        for (const index of contentIndices.slice(-newLimit)) {
          if (!annotated[index].flow) annotated[index].flow = "new";
        }
      }

      return annotated;
    }

    function annotateChineseFlow(sourceTokens, source) {
      if (annotationIntensity === "off") return sourceTokens;
      const annotated = sourceTokens.map(token => ({ ...token, flow: "" }));
      const sentences = splitSentences(source);
      const conceptCounts = new Map();
      const seenConcepts = new Set();

      for (const token of annotated) {
        const key = /[\u3400-\u9fff]/.test(token.text) ? token.text.trim() : lowerToken(token.text);
        if (!isChineseConceptKey(key)) continue;
        conceptCounts.set(key, (conceptCounts.get(key) ?? 0) + 1);
      }

      for (const sentence of sentences) {
        const indices = annotated
          .map((token, index) => ({ token, index }))
          .filter(item => item.token.start >= sentence.start && item.token.end <= sentence.end)
          .map(item => item.index);

        if (!indices.length) continue;

        const label = zhConnectorLabelForSentence(sentence.text);
        if (label) annotated[indices[0]].sentenceLabel = label;

        let repeatedConceptsInSentence = 0;
        const conceptLimit = annotationIntensity === "standard" ? 2 : 1;

        for (const index of indices) {
          const tokenText = annotated[index].text;
          const inConnector = zhConnectorGroups.some(group => group.words.some(word => tokenText.includes(word) || sentence.text.slice(annotated[index].start - sentence.start).startsWith(word)));
          const isReference = zhReferenceWords.some(word => tokenText === word || tokenText.includes(word));

          if (inConnector) {
            annotated[index].flow = "link";
          } else if (isReference) {
            annotated[index].flow = "old";
          }

          const key = /[\u3400-\u9fff]/.test(tokenText) ? tokenText.trim() : lowerToken(tokenText);
          if (isChineseConceptKey(key) && conceptCounts.get(key) > 1) {
            if (seenConcepts.has(key) && !annotated[index].flow && repeatedConceptsInSentence < conceptLimit) {
              annotated[index].flow = "new";
              repeatedConceptsInSentence += 1;
            }
            seenConcepts.add(key);
          }
        }
      }

      return annotated;
    }

    function annotateFlow(sourceTokens, source, mode) {
      if (mode === "off") return sourceTokens;
      if (mode === "zh") return annotateChineseFlow(sourceTokens, source);
      return annotateInformationFlow(sourceTokens, source);
    }

    function bionicHTML(word) {
      const chars = Array.from(word);
      if (!chars.length) return "";
      const prefixLength = Math.min(chars.length, Math.max(1, Math.ceil(chars.length * 0.45)));
      const prefix = escapeHTML(chars.slice(0, prefixLength).join(""));
      const suffix = escapeHTML(chars.slice(prefixLength).join(""));
      return `<strong>${prefix}</strong>${suffix}`;
    }

    function shouldUseBionic(word) {
      if (!/[A-Za-z0-9]/.test(word) || /[\u3400-\u9fff]/.test(word)) return false;
      if (bionicMode === "off") return false;
      if (bionicMode === "on") return true;
      return true;
    }

    function tokenHTML(word) {
      return shouldUseBionic(word) ? bionicHTML(word) : escapeHTML(word);
    }

    function escapeHTML(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      if (!tokens.length) {
        reader.innerHTML = `<div class="empty-state">${escapeHTML(t("empty"))}</div>`;
        gentleGuide.classList.remove("visible");
        updateProgress();
        updateMarkButton();
        updatePreviousButton();
        return;
      }

      const source = sourceText.value.trim();
      const currentFlowMode = effectiveFlowMode(source);
      const displayTokens = annotateFlow(tokens, source, currentFlowMode);
      const sentenceFocus = sentenceRangeForToken(activeIndex);
      const activeParagraphIndex = paragraphIndexForToken(activeIndex);
      let cursor = 0;
      const html = displayTokens.map((token, index) => {
        const active = index === activeIndex ? " active" : "";
        const flowClass = currentFlowMode !== "off" && token.flow ? ` flow-${token.flow}` : "";
        const sentenceClass = sentenceFocus && token.start >= sentenceFocus.start && token.end <= sentenceFocus.end ? " sentence-focus" : "";
        const markedClass = isTokenInMarkedSentence(token) ? " marked-sentence" : "";
        const gentleReadClass = gentleMode && activeIndex >= 0 && index < activeIndex ? " gentle-read" : "";
        const gentleOutsideClass = gentleMode && sentenceFocus && (token.start < sentenceFocus.start || token.end > sentenceFocus.end) ? " gentle-outside" : "";
        const label = currentFlowMode !== "off" && token.sentenceLabel ? `<span class="flow-label">${token.sentenceLabel}</span>` : "";
        const spacer = escapeHTML(source.slice(cursor, token.start));
        cursor = token.end;
        return `${spacer}${label}<span class="token${active}${flowClass}${sentenceClass}${markedClass}${gentleReadClass}${gentleOutsideClass}" data-index="${index}">${tokenHTML(token.text)}</span>`;
      }).join("") + escapeHTML(source.slice(cursor));

      const legend = currentFlowMode === "off" || annotationIntensity === "off" ? "" : (
        currentFlowMode === "zh"
          ? `<div class="legend">
              <span class="legend-item"><span class="swatch link">线</span>${escapeHTML(currentCopyGroup("zhLegend").link)}</span>
              <span class="legend-item"><span class="swatch old">底</span>${escapeHTML(currentCopyGroup("zhLegend").old)}</span>
              <span class="legend-item"><span class="swatch new">点</span>${escapeHTML(currentCopyGroup("zhLegend").new)}</span>
            </div>`
          : `<div class="legend">
              <span class="legend-item"><span class="swatch link">line</span>${escapeHTML(currentCopyGroup("enLegend").link)}</span>
              <span class="legend-item"><span class="swatch old">old</span>${escapeHTML(currentCopyGroup("enLegend").old)}</span>
              <span class="legend-item"><span class="swatch new">new</span>${escapeHTML(currentCopyGroup("enLegend").new)}</span>
            </div>`
      );

      const paragraphs = html
        .split(/\n{2,}/)
        .map((block, index) => {
          const gentleClass = gentleMode && activeParagraphIndex >= 0
            ? (index === activeParagraphIndex ? " gentle-current" : " gentle-away")
            : "";
          return `<p class="paragraph${gentleClass}">${block}</p>`;
        })
        .join("");

      reader.innerHTML = legend + paragraphs;
      updateGentleGuide(sentenceFocus);

      const active = reader.querySelector(".token.active");
      if (active) {
        active.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
      }

      updateProgress();
      updateMarkButton();
      updatePreviousButton();
    }

    function updateGentleGuide(sentenceFocus) {
      if (!gentleMode || !sentenceFocus || activeIndex < 0) {
        gentleGuide.classList.remove("visible");
        return;
      }

      const currentSentenceIndex = sentenceIndexForToken(activeIndex);
      const sentenceCount = splitSentences(sourceText.value).length;
      const sentenceText = sentenceFocus.text.trim().replace(/\s+/g, " ");
      gentleGuide.innerHTML = `
        <strong>${escapeHTML(t("currentSentence", { current: currentSentenceIndex + 1, total: sentenceCount }))}</strong><br>
        ${escapeHTML(sentenceText)}
      `;
      gentleGuide.classList.add("visible");
    }

    function updateProgress() {
      if (!tokens.length || activeIndex < 0) {
        progressPill.classList.remove("visible");
        return;
      }

      const ranges = paragraphRanges(sourceText.value);
      const paragraphIndex = paragraphIndexForToken(activeIndex);
      if (paragraphIndex < 0) {
        progressPill.classList.remove("visible");
        return;
      }

      progressPill.textContent = t("progress", { current: paragraphIndex + 1, total: ranges.length });
      progressPill.classList.add("visible");
    }

    function rebuildTokens() {
      tokens = tokenize(sourceText.value);
      activeIndex = -1;
      markedSentences = [];
      render();
      if (notesPanel.open) renderNotes();
      if (tokens.length) {
        setStatus(t("loaded", {
          tokens: tokens.length.toLocaleString(),
          chars: sourceText.value.length.toLocaleString()
        }));
      } else {
        setStatus(t("noText"));
      }
    }

    function tokenIndexForChar(charIndex) {
      if (!tokens.length) return -1;
      const found = tokens.findIndex(token => charIndex >= token.start && charIndex < token.end);
      if (found >= 0) return found;
      let nearest = 0;
      for (let index = 0; index < tokens.length; index += 1) {
        if (tokens[index].start <= charIndex) nearest = index;
      }
      return nearest;
    }

    function clearSilentTimer() {
      if (silentTimer) {
        window.clearTimeout(silentTimer);
        silentTimer = null;
      }
    }

    function finishReading(runId) {
      if (runId !== playbackRunId) return;
      clearSilentTimer();
      utterance = null;
      isReading = false;
      isPaused = false;
      activeIndex = -1;
      render();
      updateProgress();
      updatePlaybackButtons();
      setStatus(t("finished"));
    }

    function tokenDurationMs(token) {
      const rate = Math.max(0.1, Number(rateInput.value) || 1);
      const text = token?.text ?? "";
      let base = 300;
      if (/[。！？.!?]/.test(text)) {
        base = 520;
      } else if (/[，,、；;：:]/.test(text)) {
        base = 340;
      } else if (/[\u3400-\u9fff]/.test(text)) {
        base = 360;
      } else {
        base = Math.min(650, Math.max(230, 170 + text.length * 34));
      }
      return Math.max(90, base / rate);
    }

    function scheduleSilentAdvance(runId) {
      clearSilentTimer();
      if (runId !== playbackRunId || !isReading || isPaused) return;
      if (activeIndex >= tokens.length - 1) {
        silentTimer = window.setTimeout(() => finishReading(runId), tokenDurationMs(tokens[activeIndex]));
        return;
      }

      silentTimer = window.setTimeout(() => {
        if (runId !== playbackRunId || !isReading || isPaused) return;
        activeIndex += 1;
        render();
        setStatus(t("reading", { token: tokens[activeIndex]?.text ?? "" }));
        scheduleSilentAdvance(runId);
      }, tokenDurationMs(tokens[activeIndex]));
    }

    function stopReading({ browse = true } = {}) {
      playbackRunId += 1;
      clearSilentTimer();
      window.speechSynthesis.cancel();
      utterance = null;
      isReading = false;
      isPaused = false;
      activeIndex = -1;
      setBrowseMode(browse && tokens.length > 0);
      render();
      updateProgress();
      updatePlaybackButtons();
      setStatus(t("stopped"));
    }

    function speakFromToken(startIndex) {
      if (!tokens.length) return;
      const safeStartIndex = Math.max(0, Math.min(startIndex, tokens.length - 1));
      const source = sourceText.value.trim();
      const runId = ++playbackRunId;
      speechOffset = tokens[safeStartIndex].start;
      const text = normalizeForSpeech(source.slice(speechOffset));

      clearSilentTimer();
      window.speechSynthesis.cancel();
      activeIndex = safeStartIndex;
      isReading = true;
      isPaused = false;
      setBrowseMode(false);
      render();
      updatePlaybackButtons();

      utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = /[\u4e00-\u9fff]/.test(text) ? "zh-CN" : "en-US";
      utterance.rate = Number(rateInput.value);
      utterance.pitch = 1;
      utterance.volume = 1;
      playStartedAt = Date.now();

      utterance.onboundary = event => {
        if (runId !== playbackRunId || event.charIndex == null) return;
        const nextIndex = tokenIndexForChar(speechOffset + event.charIndex);
        if (nextIndex !== activeIndex) {
          activeIndex = nextIndex;
          render();
          setStatus(t("reading", { token: tokens[activeIndex]?.text ?? "" }));
        }
      };

      utterance.onend = () => {
        finishReading(runId);
      };

      utterance.onerror = () => {
        if (runId !== playbackRunId) return;
        const elapsed = ((Date.now() - playStartedAt) / 1000).toFixed(1);
        isReading = false;
        isPaused = false;
        activeIndex = -1;
        render();
        updateProgress();
        updatePlaybackButtons();
        setStatus(t("interrupted", { seconds: elapsed }));
      };

      setStatus(t("started", { rate: Number(rateInput.value).toFixed(2) }));
      window.speechSynthesis.speak(utterance);
    }

    function readSilentlyFromToken(startIndex) {
      if (!tokens.length) return;
      const safeStartIndex = Math.max(0, Math.min(startIndex, tokens.length - 1));
      const runId = ++playbackRunId;

      clearSilentTimer();
      window.speechSynthesis.cancel();
      utterance = null;
      activeIndex = safeStartIndex;
      isReading = true;
      isPaused = false;
      playStartedAt = Date.now();
      setBrowseMode(false);
      render();
      updatePlaybackButtons();
      setStatus(t("started", { rate: Number(rateInput.value).toFixed(2) }));
      scheduleSilentAdvance(runId);
    }

    function startFromToken(startIndex) {
      if (voiceEnabled) {
        speakFromToken(startIndex);
      } else {
        readSilentlyFromToken(startIndex);
      }
    }

    function restartAtCurrentWord() {
      if (!isReading || !tokens.length) return;
      const resumeIndex = activeIndex >= 0 ? activeIndex : 0;
      startFromToken(resumeIndex);
      setStatus(t("rateChangedNow", { rate: Number(rateInput.value).toFixed(2) }));
    }

    function play() {
      const text = normalizeForSpeech(sourceText.value);
      if (!text) {
        setStatus(t("pasteFirst"));
        sourceText.focus();
        return;
      }

      tokens = tokenize(sourceText.value);
      setBrowseMode(false);
      startFromToken(0);
    }

    async function readClipboard() {
      try {
        setBrowseMode(false);
        const text = await navigator.clipboard.readText();
        if (!text.trim()) {
          setStatus(t("clipboardEmpty"));
          return;
        }
        if (text.trim() === sourceText.value.trim()) {
          setStatus(t("clipboardUnchanged"));
          return;
        }
        sourceText.value = text;
        rebuildTokens();
        setStatus(t("clipboardLoaded"));
      } catch {
        setBrowseMode(false);
        setStatus(t("clipboardFailed"));
        sourceText.focus();
      }
    }

    function acceptExternalText(text) {
      const cleanText = String(text || "").trim();
      if (!cleanText) return;
      stopReading({ browse: false });
      setBrowseMode(false);
      sourceText.value = cleanText;
      rebuildTokens();
      setStatus(t("externalLoaded"));
      sourceText.focus();
    }

    function readTextFromURL() {
      const queryText = new URLSearchParams(window.location.search).get("text");
      const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
      const hashText = new URLSearchParams(hash).get("text");
      return queryText || hashText || "";
    }

    function setupExternalTextEntry() {
      const textFromURL = readTextFromURL();
      if (textFromURL) {
        acceptExternalText(textFromURL);
        window.history.replaceState(null, "", window.location.pathname);
      }

      window.addEventListener("message", event => {
        const data = event.data;
        if (!data || data.type !== "bandu-reader-text") return;
        acceptExternalText(data.text);
      });
    }

    function loadReadingPreferences() {
      try {
        const saved = JSON.parse(localStorage.getItem(preferenceKey) || "{}");
        if (saved.rate) rateInput.value = saved.rate;
        if (saved.font) fontInput.value = saved.font;
        if (saved.line) lineInput.value = saved.line;
        if (saved.width) widthInput.value = saved.width;
        if (saved.theme && themes.includes(saved.theme)) currentTheme = saved.theme;
      } catch {
      }
    }

    function saveReadingPreferences() {
      try {
        localStorage.setItem(preferenceKey, JSON.stringify({
          rate: rateInput.value,
          font: fontInput.value,
          line: lineInput.value,
          width: widthInput.value,
          theme: currentTheme
        }));
      } catch {
      }
    }

    function updateSettings({ save = true } = {}) {
      document.documentElement.style.setProperty("--font-size", `${fontInput.value}px`);
      document.documentElement.style.setProperty("--line-height", lineInput.value);
      document.documentElement.style.setProperty("--max-width", `${widthInput.value}px`);
      rateValue.textContent = `${Number(rateInput.value).toFixed(2)}x`;
      fontValue.textContent = `${fontInput.value}px`;
      lineValue.textContent = Number(lineInput.value).toFixed(2);
      widthValue.textContent = `${widthInput.value}px`;
      if (save) saveReadingPreferences();
    }

    function applyTheme({ applyPreset = true, save = true } = {}) {
      document.body.dataset.theme = currentTheme;
      const preset = themePresets[currentTheme];
      if (applyPreset && preset) {
        fontInput.value = preset.font;
        lineInput.value = preset.line;
        widthInput.value = preset.width;
        updateSettings({ save });
      }
      themeButton.textContent = `${t("themePrefix")}：${currentCopyGroup("themeLabels")[currentTheme]}`;
      themeButton.title = t("cycleHint");
      if (save) saveReadingPreferences();
    }

    function updateModeButtons() {
      flowButton.textContent = `${t("flowPrefix")}：${currentCopyGroup("flowLabels")[flowMode]}`;
      flowButton.title = t("cycleHint");
      flowButton.setAttribute("aria-pressed", String(flowMode !== "off"));
      bionicButton.textContent = `${t("bionicPrefix")}：${currentCopyGroup("bionicLabels")[bionicMode]}`;
      bionicButton.title = t("cycleHint");
      bionicButton.setAttribute("aria-pressed", String(bionicMode !== "off"));
      intensityButton.textContent = `${t("intensityPrefix")}：${currentCopyGroup("intensityLabels")[annotationIntensity]}`;
      intensityButton.title = t("cycleHint");
      intensityButton.hidden = flowMode === "off";
      gentleButton.textContent = gentleMode ? t("exitGentle") : t("gentle");
      gentleButton.setAttribute("aria-pressed", String(gentleMode));
    }

    function setFocusMode(value) {
      document.body.classList.toggle("focus-mode", value);
      updateModeButtons();
    }

    function randomComfortMessage() {
      const messages = currentCopyGroup("comfortMessages");
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function setGentleMode(value) {
      if (value && !gentleMode) {
        previousGentleSettings = {
          flowMode,
          bionicMode,
          annotationIntensity,
          currentTheme,
          rate: rateInput.value,
          font: fontInput.value,
          line: lineInput.value,
          width: widthInput.value
        };

        gentleMode = true;
        document.body.classList.add("gentle-mode");
        flowMode = "off";
        bionicMode = "off";
        annotationIntensity = "off";
        currentTheme = "open";
        rateInput.value = "0.95";
        setFocusMode(true);
        applyTheme({ save: false });
        fontInput.value = "42";
        lineInput.value = "2.05";
        widthInput.value = "780";
        updateSettings({ save: false });
        comfortNote.textContent = randomComfortMessage();
        setStatus(t("gentleOn"));
      } else if (!value && gentleMode) {
        gentleMode = false;
        document.body.classList.remove("gentle-mode");

        if (previousGentleSettings) {
          flowMode = previousGentleSettings.flowMode;
          bionicMode = previousGentleSettings.bionicMode;
          annotationIntensity = previousGentleSettings.annotationIntensity;
          currentTheme = previousGentleSettings.currentTheme;
          rateInput.value = previousGentleSettings.rate;
          fontInput.value = previousGentleSettings.font;
          lineInput.value = previousGentleSettings.line;
          widthInput.value = previousGentleSettings.width;
          setFocusMode(false);
          applyTheme({ applyPreset: false, save: false });
          updateSettings({ save: false });
        }

        setStatus(t("gentleOff"));
      }

      updateModeButtons();
      render();
    }

    function handleRateInput() {
      updateSettings();
      if (!isReading) return;
      if (isPaused) {
        setStatus(t("rateAfterResume", { rate: Number(rateInput.value).toFixed(2) }));
        return;
      }
      window.clearTimeout(rateRestartTimer);
      rateRestartTimer = window.setTimeout(restartAtCurrentWord, 180);
    }

    clipboardButton.addEventListener("click", readClipboard);
    playButton.addEventListener("click", play);
    voiceButton.addEventListener("click", () => {
      voiceEnabled = !voiceEnabled;
      localStorage.setItem("slowglow-voice-enabled", String(voiceEnabled));
      updateVoiceButton();

      if (isReading && !isPaused) {
        restartAtCurrentWord();
      }
      setStatus(voiceEnabled ? t("voiceEnabled") : t("voiceMuted"));
    });
    menuButton.addEventListener("click", () => {
      if (document.body.classList.contains("browse-mode")) {
        setBrowseMode(false);
        menuCollapsed = false;
        updateMenuButton();
        return;
      }
      menuCollapsed = !menuCollapsed;
      updateMenuButton();
    });
    pauseButton.addEventListener("click", () => {
      if (isPaused) {
        restartAtCurrentWord();
      } else {
        if (voiceEnabled) {
          window.speechSynthesis.pause();
        } else {
          clearSilentTimer();
        }
        isPaused = true;
        setStatus(t("paused"));
        updatePlaybackButtons();
      }
    });
    stopButton.addEventListener("click", stopReading);
    previousButton.addEventListener("click", goToPreviousSentence);
    flowButton.addEventListener("click", () => {
      const nextIndex = (flowModes.indexOf(flowMode) + 1) % flowModes.length;
      flowMode = flowModes[nextIndex];
      updateModeButtons();
      render();
    });
    bionicButton.addEventListener("click", () => {
      const nextIndex = (bionicModes.indexOf(bionicMode) + 1) % bionicModes.length;
      bionicMode = bionicModes[nextIndex];
      updateModeButtons();
      render();
    });
    intensityButton.addEventListener("click", () => {
      const nextIndex = (annotationIntensities.indexOf(annotationIntensity) + 1) % annotationIntensities.length;
      annotationIntensity = annotationIntensities[nextIndex];
      updateModeButtons();
      render();
    });
    gentleButton.addEventListener("click", () => setGentleMode(!gentleMode));
    languageButton.addEventListener("click", () => {
      uiLanguage = uiLanguage === "zh" ? "en" : "zh";
      localStorage.setItem("slowglow-ui-language", uiLanguage);
      applyLanguage({ resetStatus: true });
      render();
      if (notesPanel.open) renderNotes();
    });
    themeButton.addEventListener("click", () => {
      const nextIndex = (themes.indexOf(currentTheme) + 1) % themes.length;
      currentTheme = themes[nextIndex];
      applyTheme();
    });
    notesPanel.addEventListener("toggle", () => {
      if (notesPanel.open) renderNotes();
    });
    copyNotesButton.addEventListener("click", copyNotesDraft);
    markButton.addEventListener("click", markCurrentSentence);
    sourceText.addEventListener("input", rebuildTokens);
    rateInput.addEventListener("input", handleRateInput);
    [fontInput, lineInput, widthInput].forEach(input => input.addEventListener("input", updateSettings));
    window.addEventListener("beforeunload", () => {
      clearSilentTimer();
      window.speechSynthesis.cancel();
    });

    loadReadingPreferences();
    updateSettings({ save: false });
    applyLanguage({ resetStatus: true });
    setupExternalTextEntry();

    if ("serviceWorker" in navigator && window.location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
